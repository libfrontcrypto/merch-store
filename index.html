<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation Stack Sats — Store</title>
<meta name="description" content="Bitcoin-inspired merch. Every dollar auto-converts to BTC.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,sans-serif;background:#09090b;color:#e4e4e7;min-height:100vh}
header{background:#131317;border-bottom:1px solid #1f1f23;padding:1.2rem 2rem;text-align:center}
header h1{font-size:1.2rem;font-weight:700;color:#f59e0b;letter-spacing:-0.3px}
header p{color:#52525b;font-size:.8rem;margin-top:.2rem}
.layout{display:flex;max-width:1280px;margin:0 auto;min-height:calc(100vh - 130px)}
.sidebar{width:200px;min-width:200px;padding:2rem 1.5rem;border-right:1px solid #1f1f23;background:#0d0d10}
.sidebar h3{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:#52525b;margin-bottom:1rem}
.sidebar ul{list-style:none}
.sidebar li{margin-bottom:2px}
.sidebar a{display:flex;align-items:center;gap:.5rem;padding:.45rem .6rem;border-radius:6px;color:#a1a1aa;text-decoration:none;font-size:.85rem;transition:all .15s}
.sidebar a:hover,.sidebar a.active{background:#1a1a1f;color:#f59e0b}
.sidebar a .icon{font-size:1rem}
.sidebar a .count{font-size:.7rem;color:#52525b;margin-left:auto}
.main{flex:1;padding:2rem}
.hero{padding:0 0 1.5rem}
.hero h2{font-size:1.6rem;font-weight:700;color:#f59e0b;margin-bottom:.35rem}
.hero p{color:#71717a;font-size:.9rem}
.hero .btc-note{display:inline-block;margin-top:.75rem;padding:.3rem .9rem;background:#1a1a1f;border:1px solid #27272a;border-radius:20px;font-size:.72rem;color:#a1a1aa}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.5rem}
.card{background:#131317;border:1px solid #1f1f23;border-radius:12px;overflow:hidden;transition:border-color .2s,transform .15s;display:flex;flex-direction:column}
.card:hover{border-color:#f59e0b33;transform:translateY(-1px)}
.card img{width:100%;height:260px;object-fit:cover;background:#1a1a1f}
.card-body{padding:1.15rem;flex:1;display:flex;flex-direction:column}
.card-body h3{font-size:.92rem;font-weight:600;margin-bottom:.15rem}
.card-body .price{font-size:1.2rem;font-weight:700;color:#f59e0b;margin-bottom:.3rem}
.card-body .desc{font-size:.75rem;color:#71717a;margin-bottom:.75rem;line-height:1.4;flex:1}
.size-select{margin-bottom:.75rem}
.size-select label{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.6px;color:#52525b;margin-bottom:.3rem}
.size-select select{width:100%;padding:.45rem;background:#1a1a1f;border:1px solid #27272a;border-radius:6px;color:#e4e4e7;font-size:.82rem;cursor:pointer}
.size-select select:focus{outline:none;border-color:#f59e0b55}
.buy-btn{width:100%;padding:.7rem;border:none;border-radius:8px;background:#f59e0b;color:#09090b;font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.buy-btn:hover{opacity:.88}
.buy-btn:disabled{opacity:.35;cursor:not-allowed}
.pay-methods{display:flex;gap:.35rem;justify-content:center;margin-top:.5rem}
.pay-methods span{font-size:.58rem;text-transform:uppercase;letter-spacing:.5px;color:#52525b;background:#1a1a1f;padding:.12rem .4rem;border-radius:3px}
.empty{padding:3rem;color:#52525b;font-size:.9rem}
footer{text-align:center;padding:2rem;color:#3f3f46;font-size:.72rem;border-top:1px solid #1f1f23;line-height:1.8}
footer a{color:#52525b;text-decoration:none}
footer a:hover{color:#f59e0b}
@media (max-width:700px){.layout{flex-direction:column}.sidebar{width:100%;min-width:0;border-right:none;border-bottom:1px solid #1f1f23;padding:1rem 1.5rem}.sidebar ul{display:flex;gap:.5rem;flex-wrap:wrap}.sidebar li{margin:0}.main{padding:1.25rem}}
</style>
</head>
<body>
<header>
<h1>⚡ Operation Stack Sats</h1>
<p>Bitcoin-inspired merchandise</p>
</header>

<div class="layout">
<aside class="sidebar">
<h3>Categories</h3>
<ul id="categories"></ul>
</aside>

<main class="main">
<section class="hero">
<h2 id="cat-title">Stack Sats Merch</h2>
<p id="cat-desc">Premium gear for Bitcoiners. Every purchase auto-converts to BTC.</p>
<div class="btc-note">💰 100% of revenue → Bitcoin via Strike</div>
</section>

<div id="grid" class="grid"></div>
</main>
</div>

<footer>
Secure checkout by <a href="https://squareup.com">Square</a> · Printed by <a href="https://printful.com">Printful</a> · BTC via <a href="https://strike.me">Strike</a><br>
<a href="https://github.com/libfrontcrypto/merch-store">View source</a>
</footer>

<script>
const API_BASE = "https://linking-frequently-spiritual-anatomy.trycloudflare.com";
let storeData = null;
let activeCategory = "all";

async function init() {
  try {
    const res = await fetch('products.json?v=' + Date.now());
    storeData = await res.json();
  } catch (e) {
    document.getElementById('grid').innerHTML = `<p class="empty">Failed to load products.</p>`;
    return;
  }
  renderCategories();
  renderProducts();
}

function renderCategories() {
  const cats = storeData.categories || [];
  const products = storeData.products || [];

  // Count products per category
  const counts = {"all": products.length};
  cats.forEach(c => counts[c.id] = products.filter(p => p.category === c.id).length);

  const ul = document.getElementById('categories');
  ul.innerHTML = [
    {id: "all", name: "All", icon: "🛒", count: counts["all"]},
    ...cats.map(c => ({...c, count: counts[c.id] || 0}))
  ].map(c => `
    <li><a href="#" class="${activeCategory === c.id ? 'active' : ''}" data-cat="${c.id}"
           onclick="setCategory('${c.id}');return false">
      <span class="icon">${c.icon}</span>${c.name}
      <span class="count">${c.count}</span>
    </a></li>`).join('');
}

function setCategory(catId) {
  activeCategory = catId;
  const cat = (storeData.categories || []).find(c => c.id === catId);
  document.getElementById('cat-title').textContent = cat ? cat.name : 'All Products';
  document.getElementById('cat-desc').textContent = catId === 'all'
    ? 'Premium gear for Bitcoiners. Every purchase auto-converts to BTC.'
    : `Browse our ${cat ? cat.name.toLowerCase() : ''} collection.`;
  renderCategories();
  renderProducts();
}

function renderProducts() {
  const products = storeData.products || [];
  const filtered = activeCategory === 'all'
    ? products
    : products.filter(p => p.category === activeCategory);

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<p class="empty">Nothing here yet — check back soon.</p>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const hasSizes = p.sizes && p.sizes.length > 0;
    const sizeSelect = hasSizes ? `
      <div class="size-select">
        <label>Size</label>
        <select id="size-${p.id}">
          ${p.sizes.map((s,i) => `<option value="${s}" ${i===1?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>` : '';

    return `
    <div class="card">
      <img src="${p.image}" alt="${p.name}" loading="lazy"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22260%22><rect fill=%22%23131317%22 width=%22300%22 height=%22260%22/><text fill=%22%233f3f46%22 x=%22150%22 y=%22130%22 text-anchor=%22middle%22 font-size=%2214%22>No Image</text></svg>'">
      <div class="card-body">
        <h3>${p.name}</h3>
        <div class="price">$${p.price.toFixed(2)}</div>
        <div class="desc">${p.description || ''}</div>
        ${sizeSelect}
        <button class="buy-btn" id="btn-${p.id}" onclick="buy('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price}${hasSizes?`,document.getElementById('size-${p.id}').value`:''})">
          Buy Now — $${p.price.toFixed(0)}
        </button>
        <div class="pay-methods">
          <span>Card</span><span>Google Pay</span><span>Apple Pay</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function buy(prodId, name, price, size) {
  const btn = document.getElementById('btn-' + prodId);
  if (btn) { btn.disabled = true; btn.textContent = 'Redirecting...'; }
  const label = size ? `${name} - ${size}` : name;
  const url = `${API_BASE}/buy?product=${encodeURIComponent(label)}&price=${price}`;
  window.location.href = url;
}

init();
</script>
</body>
</html>
